<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; font-size: 12px; }
        .panel { border: 1px solid #00ff41; padding: 10px; margin-bottom: 10px; }
        .net-item { border-bottom: 1px solid #111; padding: 10px; display: flex; justify-content: space-between; }
        .btn-red { background: #500; color: #fff; border: 1px solid red; cursor: pointer; padding: 5px; }
        .btn-green { background: #050; color: #fff; border: 1px solid #0f0; cursor: pointer; padding: 5px; }
        #log { color: #888; font-size: 10px; height: 100px; overflow-y: auto; border: 1px solid #222; padding: 5px; }
    </style>
</head>
<body>
    <div class="panel"><strong>SKYNET // INTERCEPTOR DE SINAL</strong></div>
    <div id="log">> Aguardando Permissão de Hardware...</div>
    <div id="list"></div>

    <script>
        const log = document.getElementById('log');
        const list = document.getElementById('list');

        // FUNÇÃO PARA ATIVAR O GPS (O balão vai aparecer agora)
        function ativarGPS() {
            if (navigator.geolocation) {
                log.innerHTML += "<div>> Solicitando acesso ao GPS...</div>";
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        log.innerHTML += `<div style="color: #0f0">[SUCESSO] GPS Ativo: ${pos.coords.latitude}, ${pos.coords.longitude}</div>`;
                        iniciarConexao(); // Só tenta conectar depois que o GPS liberar
                    },
                    (err) => {
                        log.innerHTML += `<div style="color: red">[ERRO] Permissão negada ou GPS desligado.</div>`;
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                log.innerHTML += "<div>[ERRO] Seu navegador não suporta GPS.</div>";
            }
        }

        function iniciarConexao() {
            // Nota: localhost não funciona no celular. Use um IP real ou servidor online.
            const socket = new WebSocket('ws://localhost:8080');

            socket.onopen = () => { 
                log.innerHTML += "<div>[SUCESSO] Backend Conectado.</div>"; 
            };

            socket.onerror = () => {
                log.innerHTML += "<div style='color: orange'>> Erro de Conexão: Verifique se o servidor está rodando em localhost:8080.</div>";
            };

            socket.onmessage = (event) => {
                const res = JSON.parse(event.data);
                if (res.type === 'data') {
                    list.innerHTML = "";
                    res.networks.forEach(n => {
                        list.innerHTML += `
                        <div class="net-item">
                            <div><b>SSID: ${n.ssid}</b><br>MAC: ${n.bssid}</div>
                            <div><button class="btn-green">KEY</button></div>
                        </div>`;
                    });
                }
            };
        }

        // DISPARA O GPS ASSIM QUE ABRIR
        window.onload = ativarGPS;
    </script>
</body>
</html>
