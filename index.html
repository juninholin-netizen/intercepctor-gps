<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rael Dev - Optimizer Pro</title>
    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff2d55;
            --success: #00ff66;
            --bg: #050505;
            --card: #111;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; user-select: none;
        }

        /* Dashboard Principal */
        #dashboard {
            padding: 20px; display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box; transition: opacity 0.5s ease;
        }

        header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 2px; color: var(--neon); }
        header span { font-size: 0.7rem; color: #666; }

        /* Grade de Status */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; font-family: monospace; }
        .value-neon { color: var(--neon); }

        /* Painel de Opções */
        .options { background: var(--card); border-radius: 8px; padding: 15px; flex-grow: 1; }
        .option-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .option-info h3 { margin: 0; font-size: 0.9rem; }
        .option-info p { margin: 0; font-size: 0.7rem; color: #666; }

        /* Toggle Fake */
        .toggle {
            width: 40px; height: 20px; background: #333; border-radius: 10px;
            position: relative; cursor: pointer;
        }
        .toggle::after {
            content: ''; position: absolute; width: 16px; height: 16px;
            background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s;
        }
        .toggle.active { background: var(--neon); }
        .toggle.active::after { left: 22px; }

        /* Botão de Injeção */
        .btn-container { padding: 20px 0; }
        #inject-btn {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 18px; border-radius: 8px; font-weight: 800; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Tela de Logs (Simulação LiveBoot) */
        #log-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; padding: 10px; box-sizing: border-box;
        }
        #log-container {
            height: 100%; display: flex; flex-direction: column; justify-content: flex-end;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; line-height: 1.2;
        }
        .log-line { margin: 1px 0; white-space: nowrap; }
        .c-red { color: var(--danger); }
        .c-green { color: var(--success); }
        .c-cyan { color: var(--neon); }

        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 2px solid #111; border-top-color: var(--neon);
            border-radius: 50%; animation: spin 0.7s infinite linear;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    </style>
</head>
<body>

    <div id="dashboard">
        <header>
            <h1>RAEL DEV MOBILE</h1>
            <span>V4.0 ULTIMATE PERFORMANCE</span>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">CPU Usage</div>
                <div class="stat-value" id="cpu-val">--%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Device FPS</div>
                <div class="stat-value" id="fps-val">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">RAM Free</div>
                <div class="stat-value value-neon" id="ram-val">-- MB</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Temp</div>
                <div class="stat-value" id="temp-val">--°C</div>
            </div>
        </div>

        <div class="options">
            <div class="option-item">
                <div class="option-info">
                    <h3>Unlock 120 FPS</h3>
                    <p>Forçar taxa de atualização máxima</p>
                </div>
                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
            </div>
            <div class="option-item">
                <div class="option-info">
                    <h3>GPU Turbo Boost</h3>
                    <p>Otimizar renderização de shaders</p>
                </div>
                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
            </div>
            <div class="option-item">
                <div class="option-info">
                    <h3>Anti-Lag Engine</h3>
                    <p>Reduzir latência de rede e processamento</p>
                </div>
                <div class="toggle" onclick="this.classList.toggle('active')"></div>
            </div>
        </div>

        <div class="btn-container">
            <button id="inject-btn">INJETAR SISTEMA</button>
        </div>
    </div>

    <div id="log-screen">
        <div id="log-container"></div>
        <div class="loader"></div>
    </div>

    <script>
        // Simulador de Stats
        setInterval(() => {
            document.getElementById('cpu-val').innerText = (Math.random() * 40 + 20).toFixed(1) + '%';
            document.getElementById('fps-val').innerText = Math.floor(Math.random() * 5 + 58);
            document.getElementById('ram-val').innerText = Math.floor(Math.random() * 500 + 1200) + ' MB';
            document.getElementById('temp-val').innerText = (Math.random() * 2 + 36).toFixed(1) + '°C';
        }, 1000);

        const btn = document.getElementById('inject-btn');
        const dash = document.getElementById('dashboard');
        const logScreen = document.getElementById('log-screen');
        const logContainer = document.getElementById('log-container');

        const logs = [
            "SYS: Initializing RaelDev kernel...",
            "CORE: Overclocking Adreno GPU clusters",
            "FPS: Setting display refresh to 120Hz",
            "MEM: Purging non-critical background services",
            "NET: Injecting low-latency socket patches",
            "SYS: Disabling thermal throttling limits",
            "BOOT: Executing bypass_security_init.sh",
            "INFO: Optimized for Free Fire & Roblox",
            "SUCCESS: Dalvik cache layers re-aligned"
        ];

        let isRunning = false;
        const colors = ['c-cyan', 'c-green', 'c-red', ''];

        function runLogs() {
            if(!isRunning) return;
            const fragment = document.createDocumentFragment();
            for(let i=0; i<3; i++) {
                const line = document.createElement('div');
                line.className = `log-line ${colors[Math.floor(Math.random()*colors.length)]}`;
                line.textContent = `[${Date.now().toString().slice(-6)}] ${logs[Math.floor(Math.random()*logs.length)]} -> 0x${Math.random().toString(16).slice(2,8).toUpperCase()}`;
                fragment.appendChild(line);
            }
            logContainer.appendChild(fragment);
            if(logContainer.childElementCount > 80) logContainer.removeChild(logContainer.firstChild);
            requestAnimationFrame(runLogs);
        }

        btn.onclick = () => {
            dash.style.opacity = '0';
            setTimeout(() => {
                dash.style.display = 'none';
                logScreen.style.display = 'block';
                isRunning = true;
                requestAnimationFrame(runLogs);
            }, 500);

            // 20 Segundos de carregamento
            setTimeout(() => {
                isRunning = false;
                logScreen.style.display = 'none';
                dash.style.display = 'flex';
                dash.style.opacity = '1';
                
                // Resultado Final
                document.getElementById('fps-val').innerText = "120";
                document.getElementById('fps-val').style.color = "var(--success)";
                alert("SISTEMA INJETADO!\nPerformance: 120 FPS Ativo\nStatus: Rael Dev Mobile ON");
            }, 20000);
        };
    </script>
</body>
</html>
