<!DOCTYPE html>
<html>
<head>
    <style>
        /* MANTIDO SEU ESTILO ORIGINAL */
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; font-size: 12px; }
        .panel { border: 1px solid #00ff41; padding: 10px; margin-bottom: 10px; }
        .net-item { border-bottom: 1px solid #111; padding: 10px; display: flex; justify-content: space-between; }
        .btn-red { background: #500; color: #fff; border: 1px solid red; cursor: pointer; padding: 5px; }
        .btn-green { background: #050; color: #fff; border: 1px solid #0f0; cursor: pointer; padding: 5px; }
        #log { color: #888; font-size: 10px; height: 100px; overflow-y: auto; border: 1px solid #222; padding: 5px; }
    </style>
</head>
<body>
    <div class="panel"><strong>SKYNET // INTERCEPTOR DE SINAL</strong></div>
    <div id="log">> Aguardando Backend...</div>
    <div id="list"></div>

    <script>
        const log = document.getElementById('log');
        const list = document.getElementById('list');

        // --- ADICIONADO: FUNÇÃO PARA RODAR O GPS E APARECER O BALÃO ---
        function solicitarGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        log.innerHTML += `<div>[SUCESSO] GPS Ativo. Aguardando redes...</div>`;
                    },
                    (err) => {
                        log.innerHTML += `<div>[ERRO] Ative o GPS no Android!</div>`;
                    },
                    { enableHighAccuracy: true }
                );
            }
        }

        // MANTIDA SUA LÓGICA DE WEBSOCKET E INTERFACE
        const socket = new WebSocket('ws://localhost:8080');

        socket.onopen = () => { 
            log.innerHTML += "<div>[SUCESSO] Link ativo. Buscando alvos...</div>"; 
            solicitarGPS(); // Chama o GPS assim que conecta
        };

        socket.onmessage = (event) => {
            const res = JSON.parse(event.data);
            if (res.type === 'data') {
                list.innerHTML = "";
                res.networks.forEach(n => {
                    list.innerHTML += `
                    <div class="net-item">
                        <div>
                            <b>SSID: ${n.ssid}</b><br>
                            MAC: ${n.bssid} | SINAL: ${n.signal_level}dBm
                        </div>
                        <div>
                            <button class="btn-green" onclick="sendCmd('GET_PASSWORD', '${n.ssid}')">KEY</button>
                            <button class="btn-red" onclick="sendCmd('DROP_NET', '${n.bssid}')">KILL</button>
                        </div>
                    </div>`;
                });
            }
            if (res.type === 'terminal') { 
                log.innerHTML += `<div>> ${res.msg}</div>`; 
                log.scrollTop = log.scrollHeight; 
            }
        };

        function sendCmd(action, target) {
            socket.send(JSON.stringify({ action, bssid: target, ssid: target }));
        }

        // Tenta pedir o GPS logo no início para garantir
        window.onload = solicitarGPS;
    </script>
</body>
</html>
